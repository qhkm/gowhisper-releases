name: Build
on:
  push:
    branches:
      - main

jobs:
  # build_on_linux:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v2
  #     - uses: actions/setup-node@v2
  #       with:
  #         node-version: 16
  #     - name: install dependencies
  #       run: npm install --force
  #     - name: build
  #       run: npm run build
  #     - name: package
  #       run: npm run package:linux -- --publish always
  #       run: npm run package:linux -- --publish always

  build_on_mac:
    if: false  # disabled for the 1.1.0 Windows validation run; re-enable + bump ref/tag for a full release
    runs-on: macos-latest
    steps:
      - name: Checkout gh repo
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.OWNER }}/${{ secrets.REPO }}
          token: ${{ secrets.GH_TOKEN }}
          ref: "e9b50ca42efd0db5e665a9eb382549fa8d8b8429"
      # - name: Checkout latest release tag and set to ouput
      #   id: tag
      #   run: |
      #     echo "release_tag=$(git describe --tags $(git rev-list --tags --max-count=1) | tr -d '\n')" >> "$GITHUB_OUTPUT"
      - name: Setup node
        uses: actions/setup-node@v3

      - name: Install dependencies
        run: brew install python-setuptools

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npm run build

      - name: List workspace contents
        run: |
          ls -la $GITHUB_WORKSPACE

      - name: Package app for distribution
        env:
          # This is used for uploading release assets to github
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          npm run package:mac -- --publish never

      - name: publish to release repo
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: qhkm/gowhisper-releases
          tag_name: v.1.0.19
          draft: true
          files: |
            release/build/*.dmg
            release/build/*.zip
            release/build/*.yml
            release/build/*.yaml

  build_on_win:
    runs-on: windows-latest
    steps:
      - name: Checkout gh repo
        uses: actions/checkout@v3
        with:
          repository: ${{ secrets.OWNER }}/${{ secrets.REPO }}
          token: ${{ secrets.GH_TOKEN }}
          ref: "75bf807e10ba605016910571cf5e0da2f4b8a101"
          # path: "./gowhisper"
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --force

      - name: list workspace contents
        run: |
          Get-ChildItem $env:GITHUB_WORKSPACE

      - name: Print current directory
        run: Get-Location

      - name: package
        run: npm run package:win -- --publish never

      - name: list release build contents
        run: |
          Get-ChildItem $env:GITHUB_WORKSPACE\release\build

      # Signing intentionally skipped — SSL.com cert expired. Shipping unsigned
      # for now (Windows shows a SmartScreen "More info -> Run anyway" prompt).
      # To re-enable signing later, restore the CodeSignTool download + sign +
      # updateHash steps and publish from the workspace root instead.

      - name: Release (unsigned) to gowhisper-releases
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          repository: qhkm/gowhisper-releases
          tag_name: v.1.1.0
          draft: true
          body: "Release v.1.1.0 (Windows, unsigned — on first launch click More info -> Run anyway)"
          files: |
            release/build/GoWhisper-1.1.0-win-x64.exe
            release/build/GoWhisper-1.1.0-win-x64.exe.blockmap
            release/build/latest.yml